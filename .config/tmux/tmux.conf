set -g status-position top

set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# unbind C-b
set -g prefix C-q

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @catppuccin_flavour 'mocha'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

thm_blue="#89b4fa"
thm_orange="#fab387"
set -g window-status-current-format "#[fg=colour232,bg=$thm_orange] #I #[fg=colour255,bg=colour237] #W  "
set -g window-status-format "#[fg=colour232,bg=$thm_blue] #I #[fg=colour255,bg=colour237] #W  "
set-option -g status-right "#S  "
set-option -g status-left "  "
set -g window-status-separator ""
set -g status-justify left

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

##########################################################################################################################################

bind -n \uE175 neww -c "#{pane_current_path}"

# set -s user-keys[0] "\uE176"
# bind-key -n User0 next-window
# set -s user-keys[1] "\uE18"
set -s user-keys[1] "\uE118"
bind-key -n User1 kill-window
bind -n \uE177 prev

set -s user-keys[2] "\uE173"
bind-key -n User2 swap-window -t -1 \; prev

set -s user-keys[3] "\uE174"
bind-key -n User3 swap-window -t +1 \; next-window

##########################################################################################################################################
run '~/.tmux/plugins/tpm/tpm'
